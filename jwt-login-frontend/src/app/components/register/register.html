<div class="container register-container">
  <h2>Register</h2>

  <form [formGroup]="registerForm" (ngSubmit)="registerUser()">
    <div class="form-group">
      <input
        type="text"
        placeholder="Username"
        formControlName="username"
        required>
      <div *ngIf="registerForm.get('username')?.invalid && registerForm.get('username')?.touched" class="error">
        <span *ngIf="registerForm.get('username')?.errors?.['required']">Username is required</span>
        <span *ngIf="registerForm.get('username')?.errors?.['minlength']">Username must be at least 3 characters</span>
      </div>
    </div>

    <div class="form-group">
      <input
        type="email"
        placeholder="Email"
        formControlName="email"
        required>
      <div *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched" class="error">
        <span *ngIf="registerForm.get('email')?.errors?.['required']">Email is required</span>
        <span *ngIf="registerForm.get('email')?.errors?.['email']">Invalid email format</span>
      </div>
    </div>

    <div class="form-group">
      <input
        type="password"
        placeholder="Password"
        formControlName="password"
        required>
      <div *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched" class="error">
        <span *ngIf="registerForm.get('password')?.errors?.['required']">Password is required</span>
        <span *ngIf="registerForm.get('password')?.errors?.['minlength']">Password must be at least 6 characters</span>
      </div>
    </div>

    <div class="form-group">
      <input
        type="password"
        placeholder="Confirm Password"
        formControlName="confirmPassword"
        required>
      <div *ngIf="registerForm.get('confirmPassword')?.invalid && registerForm.get('confirmPassword')?.touched" class="error">
        <span *ngIf="registerForm.get('confirmPassword')?.errors?.['required']">Confirm password is required</span>
      </div>
      <div *ngIf="registerForm.errors?.['mismatch'] && registerForm.get('confirmPassword')?.touched" class="error">
        Passwords do not match
      </div>
    </div>

    <button type="submit" [disabled]="loading || registerForm.invalid">
      {{ loading ? 'Registering...' : 'Register' }}
    </button>
  </form>

  <div *ngIf="errorMessage" class="error-message">
    {{ errorMessage }}
  </div>

  <p>
    Already have an account?
    <a routerLink="/login">Login here</a>
  </p>
</div>
